name: Linux sandbox

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: linux-sandbox-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bubblewrap-isolation:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install sandbox dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bubblewrap busybox-static
          /usr/bin/bwrap --version
          /usr/bin/bwrap --help 2>&1 | grep --fixed-strings -- '--disable-userns'

      - name: Allow Bubblewrap user namespace setup
        run: sudo /usr/sbin/apparmor_parser --replace .github/apparmor/bwrap

      - name: Verify Bubblewrap namespace setup
        run: |
          /usr/bin/bwrap \
            --unshare-user \
            --disable-userns \
            --unshare-net \
            --ro-bind / / \
            -- \
            /usr/bin/true

      - name: Prepare delegated cgroup v2 subtree
        shell: bash
        run: |
          test "$(stat --file-system --format=%T /sys/fs/cgroup)" = cgroup2fs
          echo '+cpu +memory' | sudo tee /sys/fs/cgroup/cgroup.subtree_control >/dev/null
          sudo mkdir /sys/fs/cgroup/aios-ci
          echo '+cpu +memory' | sudo tee /sys/fs/cgroup/aios-ci/cgroup.subtree_control >/dev/null
          sudo mkdir /sys/fs/cgroup/aios-ci/runtime
          sudo chown --recursive "$(id -u):$(id -g)" /sys/fs/cgroup/aios-ci

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run workspace tests
        run: cargo test --workspace --all-targets --locked

      - name: Run Linux Bubblewrap boundary tests
        env:
          AIOS_BWRAP_PATH: /usr/bin/bwrap
          AIOS_BUSYBOX_PATH: /usr/bin/busybox
          AIOS_CGROUP_ROOT: /sys/fs/cgroup/aios-ci
        shell: bash
        run: |
          sudo --preserve-env=PATH,AIOS_BWRAP_PATH,AIOS_BUSYBOX_PATH,AIOS_CGROUP_ROOT \
            bash -c '
              echo "$BASHPID" > "$AIOS_CGROUP_ROOT/runtime/cgroup.procs"
              exec setpriv \
                --reuid="$(id -u "$SUDO_USER")" \
                --regid="$(id -g "$SUDO_USER")" \
                --init-groups \
                cargo test -p aios-adapter-process --test linux_bubblewrap --locked -- --ignored
            '

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
